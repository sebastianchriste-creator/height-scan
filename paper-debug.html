<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Paper Debug – Corners</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { width:100%; height:100%; background:#111; overflow:hidden; font-family:monospace; color:#eee; }
    #wrap { position:relative; width:100%; height:100%; }
    video  { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    canvas { position:absolute; inset:0; width:100%; height:100%; }

    #panel {
      position:absolute; bottom:0; left:0; right:0;
      background:rgba(0,0,0,0.85);
      padding:10px 14px 22px;
      display:grid; grid-template-columns:repeat(4,1fr); gap:6px 10px;
    }
    .cell { display:flex; flex-direction:column; }
    .cell .lbl { font-size:9px; color:#888; letter-spacing:.06em; text-transform:uppercase; }
    .cell .val { font-size:15px; font-weight:700; margin-top:1px; }
    .ok  { color:#4CAF50; }
    .bad { color:#ff6b6b; }
    .dim { color:#aaa; }

    #sel {
      position:absolute; top:max(20px,env(safe-area-inset-top)); right:14px;
      display:flex; gap:6px;
    }
    #sel button {
      background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.3);
      color:#eee; font:bold 12px monospace; padding:6px 12px; border-radius:20px;
    }
    #sel button.active { background:#E8604C; border-color:#E8604C; }
    #title {
      position:absolute; top:max(20px,env(safe-area-inset-top)); left:14px;
      font-size:11px; font-weight:700; letter-spacing:.1em;
      color:rgba(255,255,255,0.45); text-transform:uppercase;
    }
  </style>
</head>
<body>
<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="oc"></canvas>
</div>
<div id="title">PAPER DEBUG – CORNERS</div>
<div id="sel">
  <button id="btn-a4" class="active" onclick="setPaper('A4')">A4</button>
  <button id="btn-letter" onclick="setPaper('Letter')">Letter</button>
</div>
<div id="panel">
  <div class="cell"><div class="lbl">Status</div><div class="val" id="p-status">—</div></div>
  <div class="cell"><div class="lbl">pH (px)</div><div class="val" id="p-ph">—</div></div>
  <div class="cell"><div class="lbl">mm/px</div><div class="val" id="p-mmPx">—</div></div>
  <div class="cell"><div class="lbl">Inner bri</div><div class="val" id="p-bri">—</div></div>

  <div class="cell"><div class="lbl">spanH (det px)</div><div class="val" id="p-spanH">—</div></div>
  <div class="cell"><div class="lbl">spanW (det px)</div><div class="val" id="p-spanW">—</div></div>
  <div class="cell"><div class="lbl">detRatio</div><div class="val" id="p-ratio">—</div></div>
  <div class="cell"><div class="lbl">expRatio</div><div class="val" id="p-exp">—</div></div>

  <div class="cell" style="grid-column:span 2">
    <div class="lbl">Corner strengths (TL TR BL BR)</div>
    <div class="val dim" id="p-corners">—</div>
  </div>
  <div class="cell" style="grid-column:span 2">
    <div class="lbl">180cm = ? px @ this mmPx</div>
    <div class="val" id="p-ref">—</div>
  </div>
</div>

<script>
const PAPER = { A4:{w:210,h:297}, Letter:{w:216,h:279} };
let selectedPaper = 'A4';
function setPaper(p) {
  selectedPaper = p;
  document.getElementById('btn-a4').classList.toggle('active', p==='A4');
  document.getElementById('btn-letter').classList.toggle('active', p==='Letter');
}

const video = document.getElementById('video');
const oc    = document.getElementById('oc');
const ctx   = oc.getContext('2d');
const pc    = document.createElement('canvas');
const pctx  = pc.getContext('2d', {willReadFrequently:true});

function resize() { oc.width=window.innerWidth; oc.height=window.innerHeight; }
window.addEventListener('resize', resize); resize();

function getCrop() {
  const vw=video.videoWidth, vh=video.videoHeight, dw=oc.width, dh=oc.height;
  if (!vw||!vh) return null;
  if (vw/vh>dw/dh) { const s=dh/vh; return {sx:(vw-dw/s)/2,sy:0,sw:dw/s,sh:vh,scale:s}; }
  const s=dw/vw; return {sx:0,sy:(vh-dh/s)/2,sw:vw,sh:dh/s,scale:s};
}
function panelH() { return document.getElementById('panel').offsetHeight||140; }
function guideRect() {
  const W=oc.width, H=oc.height, top=70, availH=H-top-panelH()-20;
  const gH=availH*0.60, gW=gH*(PAPER[selectedPaper].w/PAPER[selectedPaper].h);
  return {x:W*0.05, y:top+availH*0.04, w:gW, h:gH};
}

function _innerBrightness(L,pw,y0,y1,x0,x1) {
  const sy=y0+Math.round((y1-y0)*0.15), ey=y1-Math.round((y1-y0)*0.15);
  const sx=x0+Math.round((x1-x0)*0.10), ex=x1-Math.round((x1-x0)*0.10);
  let s=0,n=0;
  for (let y=sy;y<ey;y++) for (let x=sx;x<ex;x++){s+=L[y*pw+x];n++;}
  return n>0?s/n:0;
}

// ── CORNER DETECTION ──────────────────────────────────────────────────────────
// Corner response R = |Gx|·|Gy| — fires where BOTH horizontal and vertical
// gradients are strong simultaneously. This is exactly the property that
// distinguishes paper corners from a plain wall (which has neither gradient)
// or a straight edge (which has only one gradient direction).
//
// Detection steps:
//  1. Compute Sobel Gx, Gy on the guide-rect sample
//  2. Compute R = |Gx|·|Gy| per pixel
//  3. NMS (7×7 neighbourhood) → candidate corner peaks
//  4. Assign best peak per quadrant (TL/TR/BL/BR) using brightness centroid as
//     the quadrant centre — handles off-centre paper
//  5. From the 4 corners derive spanH, spanW → pH via aspect ratio
// ─────────────────────────────────────────────────────────────────────────────
let lastResult = null;

function detectPaperCorners(g) {
  lastResult = null;
  const cp = getCrop();
  if (!cp||!video.videoWidth) return null;

  const PH=220, scale=PH/g.h, pw=Math.round(g.w*scale);
  pc.width=pw; pc.height=PH;
  pctx.drawImage(video,
    g.x/cp.scale+cp.sx, g.y/cp.scale+cp.sy,
    g.w/cp.scale, g.h/cp.scale,
    0,0,pw,PH);
  const d = pctx.getImageData(0,0,pw,PH).data;

  // Luma
  const L = new Float32Array(pw*PH);
  for (let i=0;i<pw*PH;i++)
    L[i]=0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2];

  // Sobel Gx (vertical edges) and Gy (horizontal edges)
  const Gx=new Float32Array(pw*PH), Gy=new Float32Array(pw*PH);
  for (let y=1;y<PH-1;y++) {
    for (let x=1;x<pw-1;x++) {
      const i=y*pw+x;
      Gy[i]=(L[(y+1)*pw+x-1]+2*L[(y+1)*pw+x]+L[(y+1)*pw+x+1]
             -L[(y-1)*pw+x-1]-2*L[(y-1)*pw+x]-L[(y-1)*pw+x+1])/4;
      Gx[i]=(L[(y-1)*pw+x+1]+2*L[y*pw+x+1]+L[(y+1)*pw+x+1]
             -L[(y-1)*pw+x-1]-2*L[y*pw+x-1]-L[(y+1)*pw+x-1])/4;
    }
  }

  // Corner response
  const R=new Float32Array(pw*PH);
  let maxR=0;
  for (let i=0;i<pw*PH;i++) {
    R[i]=Math.abs(Gx[i])*Math.abs(Gy[i]);
    if (R[i]>maxR) maxR=R[i];
  }

  if (maxR<4) return null; // nothing interesting at all

  // NMS with 7×7 window, keep points above 5% of global max
  const NR=7, minR=maxR*0.05;
  const peaks=[];
  for (let y=NR;y<PH-NR;y++) {
    for (let x=NR;x<pw-NR;x++) {
      const r=R[y*pw+x];
      if (r<minR) continue;
      let best=true;
      outer: for (let dy=-NR;dy<=NR;dy++) {
        for (let dx=-NR;dx<=NR;dx++) {
          if (dx===0&&dy===0) continue;
          if (R[(y+dy)*pw+(x+dx)]>r){best=false;break outer;}
        }
      }
      if (best) peaks.push({x,y,r});
    }
  }
  if (peaks.length<4) return null;

  peaks.sort((a,b)=>b.r-a.r);

  // Brightness centroid — used as dynamic quadrant centre so off-centre paper still works
  let cx=0,cy=0,tb=0;
  for (let y=0;y<PH;y++) for (let x=0;x<pw;x++){const b=L[y*pw+x];cx+=x*b;cy+=y*b;tb+=b;}
  if (tb>0){cx/=tb;cy/=tb;}else{cx=pw/2;cy=PH/2;}

  // Best corner per quadrant relative to brightness centroid
  const Q=[null,null,null,null]; // TL,TR,BL,BR
  for (const p of peaks) {
    const q=(p.y>=cy?2:0)+(p.x>=cx?1:0);
    if (!Q[q]||p.r>Q[q].r) Q[q]=p;
  }
  if (Q.some(c=>!c)) return null;

  const [tl,tr,bl,br]=Q;

  // Sanity: corners must form a plausible quadrilateral
  if (tr.x<=tl.x||br.x<=bl.x||bl.y<=tl.y||br.y<=tr.y) return null;

  const spanH=((bl.y-tl.y)+(br.y-tr.y))/2;
  const spanW=((tr.x-tl.x)+(br.x-bl.x))/2;
  if (spanH<10||spanW<10) return null;

  // Inner brightness: the region enclosed by the 4 corners must be bright (=paper)
  const x0=Math.min(tl.x,bl.x), x1=Math.max(tr.x,br.x);
  const y0=Math.min(tl.y,tr.y), y1=Math.max(bl.y,br.y);
  const inner=_innerBrightness(L,pw,y0,y1,x0,x1);
  if (inner<90) return null;

  // Aspect ratio — derive pH from both H and W, weight by which is more reliable
  const expRatio=PAPER[selectedPaper].w/PAPER[selectedPaper].h;
  const detRatio=spanW/spanH;
  // pH in screen pixels
  let pH;
  if (Math.abs(detRatio-expRatio)/expRatio<0.25) {
    // Both agree — use H directly (more pixels → more accurate for portrait paper)
    pH=spanH/scale;
  } else {
    // Disagree — use whichever gives an answer closer to expected aspect ratio
    const pH_fromH=spanH/scale;
    const pH_fromW=(spanW/expRatio)/scale;
    // Pick the one whose implied ratio is closer to expected
    const errH=Math.abs((spanW/spanH)-expRatio);
    const errW=Math.abs((spanW/(spanW/expRatio))-expRatio); // always 0, so prefer W
    pH = errH<0.15 ? pH_fromH : pH_fromW;
  }

  const corners4=[
    {x:g.x+tl.x/pw*g.w, y:g.y+tl.y/PH*g.h, r:tl.r, lbl:'TL'},
    {x:g.x+tr.x/pw*g.w, y:g.y+tr.y/PH*g.h, r:tr.r, lbl:'TR'},
    {x:g.x+bl.x/pw*g.w, y:g.y+bl.y/PH*g.h, r:bl.r, lbl:'BL'},
    {x:g.x+br.x/pw*g.w, y:g.y+br.y/PH*g.h, r:br.r, lbl:'BR'},
  ];

  return {pH, spanH, spanW, detRatio, expRatio, inner:Math.round(inner),
          mmPx:PAPER[selectedPaper].h/pH, corners:corners4, maxR, scale};
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw(res) {
  const g=guideRect();
  ctx.clearRect(0,0,oc.width,oc.height);
  const ok=!!res;

  // Guide rect
  ctx.save();
  if (!ok) ctx.setLineDash([6,5]);
  ctx.strokeStyle=ok?'#4CAF50':'rgba(255,255,255,0.4)';
  ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.roundRect(g.x,g.y,g.w,g.h,8); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=ok?'rgba(76,175,80,0.07)':'rgba(255,255,255,0.03)';
  ctx.beginPath(); ctx.roundRect(g.x,g.y,g.w,g.h,8); ctx.fill();
  ctx.restore();

  // Label
  ctx.fillStyle=ok?'#4CAF50':'rgba(255,255,255,0.5)';
  ctx.font='bold 13px monospace'; ctx.textAlign='center';
  ctx.fillText(selectedPaper+(ok?' ✓':''), g.x+g.w/2, g.y+20);

  if (!ok) {
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.font='11px monospace'; ctx.textAlign='center';
    ctx.fillText('Place paper inside this box', g.x+g.w/2, g.y+g.h/2);
  }

  if (res) {
    const C=res.corners; // [TL,TR,BL,BR]

    // Draw paper outline (quadrilateral connecting the 4 corners)
    ctx.save();
    ctx.strokeStyle='rgba(126,200,227,0.9)'; ctx.lineWidth=2;
    ctx.setLineDash([5,4]);
    ctx.beginPath();
    ctx.moveTo(C[0].x,C[0].y); // TL
    ctx.lineTo(C[1].x,C[1].y); // TR
    ctx.lineTo(C[3].x,C[3].y); // BR
    ctx.lineTo(C[2].x,C[2].y); // BL
    ctx.closePath(); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Corner dots + labels
    ctx.save();
    C.forEach(c=>{
      const strong=c.r>res.maxR*0.15;
      ctx.beginPath();
      ctx.arc(c.x,c.y,6,0,Math.PI*2);
      ctx.fillStyle=strong?'#7ec8e3':'rgba(126,200,227,0.4)';
      ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1;
      ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='bold 10px monospace';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(c.lbl,c.x,c.y-14);
    });
    ctx.restore();

    // pH bracket (left side)
    const ty=C[0].y, by=C[2].y;
    ctx.save();
    ctx.strokeStyle='rgba(126,200,227,0.5)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(g.x-14,ty); ctx.lineTo(g.x-14,by); ctx.stroke();
    ctx.fillStyle='rgba(126,200,227,0.9)'; ctx.font='10px monospace';
    ctx.textAlign='right';
    ctx.fillText(`${res.pH.toFixed(0)}px`, g.x-17, (ty+by)/2+4);
    ctx.restore();
  }

  // ── Data panel ──────────────────────────────────────────────────────────
  const set=(id,v,cls)=>{ const e=document.getElementById(id); e.textContent=v; e.className='val '+(cls||'dim'); };

  if (res) {
    const ratioOk=Math.abs(res.detRatio-res.expRatio)/res.expRatio<0.25;
    set('p-status','PAPER OK','ok');
    set('p-ph',   res.pH.toFixed(1)+' px','ok');
    set('p-mmPx', res.mmPx.toFixed(2)+' mm/px','ok');
    set('p-bri',  res.inner+'/255', res.inner>=130?'ok':res.inner>=90?'dim':'bad');
    set('p-spanH',res.spanH.toFixed(0)+' px','dim');
    set('p-spanW',res.spanW.toFixed(0)+' px','dim');
    set('p-ratio',res.detRatio.toFixed(3), ratioOk?'ok':'bad');
    set('p-exp',  res.expRatio.toFixed(3),'dim');
    const cstr=res.corners.map(c=>c.r.toFixed(0)).join(' ');
    set('p-corners',cstr,'dim');
    const ref=Math.round(1800/res.mmPx);
    set('p-ref', ref+' px', ref>200&&ref<900?'ok':'bad');
  } else {
    ['p-status','p-ph','p-mmPx','p-bri','p-spanH','p-spanW','p-ratio','p-exp','p-corners','p-ref']
      .forEach(id=>set(id,'—','bad'));
    set('p-status','NO PAPER','bad');
    set('p-exp', PAPER[selectedPaper].w/PAPER[selectedPaper].h|0===0
        ? (PAPER[selectedPaper].w/PAPER[selectedPaper].h).toFixed(3) : '—', 'dim');
  }
}

// ── LOOP ─────────────────────────────────────────────────────────────────────
async function start() {
  try {
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}},audio:false});
    video.srcObject=stream; await video.play();
  } catch(e) { alert('Camera: '+e.message); return; }

  function loop() {
    if (video.videoWidth>0) {
      const res=detectPaperCorners(guideRect());
      draw(res);
    }
    requestAnimationFrame(loop);
  }
  loop();
}
start();
</script>
</body>
</html>

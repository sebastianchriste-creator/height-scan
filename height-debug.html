<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Paper Debug</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;background:#111;overflow:hidden;font-family:monospace;color:#eee}
    #wrap{position:relative;width:100%;height:100%}
    video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    canvas{position:absolute;inset:0;width:100%;height:100%}

    /* ── bottom panel ── */
    #panel{
      position:absolute;bottom:0;left:0;right:0;
      background:rgba(0,0,0,0.87);
      padding:8px 12px 20px;
      display:grid;grid-template-columns:repeat(4,1fr);gap:5px 8px;
    }
    .cell{display:flex;flex-direction:column}
    .cell .lbl{font-size:9px;color:#888;letter-spacing:.05em;text-transform:uppercase}
    .cell .val{font-size:14px;font-weight:700;margin-top:1px}
    .ok {color:#4CAF50} .bad{color:#ff6b6b} .dim{color:#aaa} .warn{color:#EDD94E}

    /* ── method pills ── */
    #methods{
      position:absolute;left:50%;transform:translateX(-50%);
      display:flex;gap:5px;
    }
    .pill{
      font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;
      border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.35);
      transition:all .2s;
    }
    .pill.active-A{background:rgba(126,200,227,0.25);border-color:#7ec8e3;color:#7ec8e3}
    .pill.active-B{background:rgba(237,217,78,0.2);border-color:#EDD94E;color:#EDD94E}
    .pill.active-C{background:rgba(76,175,80,0.2);border-color:#4CAF50;color:#4CAF50}
    .pill.active-D{background:rgba(255,150,50,0.2);border-color:#ff9632;color:#ff9632}

    /* ── paper type ── */
    #sel{position:absolute;top:max(20px,env(safe-area-inset-top));right:14px;display:flex;gap:6px}
    #sel button{
      background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.3);
      color:#eee;font:bold 12px monospace;padding:6px 12px;border-radius:20px;
    }
    #sel button.active{background:#E8604C;border-color:#E8604C}

    /* ── title ── */
    #title{
      position:absolute;top:max(20px,env(safe-area-inset-top));left:14px;
      font-size:11px;font-weight:700;letter-spacing:.1em;
      color:rgba(255,255,255,0.4);text-transform:uppercase;
    }

    /* ── stability ring ── */
    #stab-ring{
      position:absolute;right:14px;
      width:58px;height:58px;
    }
    #stab-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
    #stab-track{fill:none;stroke:rgba(255,255,255,0.12);stroke-width:4}
    #stab-fill {fill:none;stroke:#4CAF50;stroke-width:4;
                stroke-linecap:round;
                stroke-dasharray:163;stroke-dashoffset:163;
                transition:stroke-dashoffset .15s linear}
    #stab-icon{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      font-size:22px;
    }

    /* ── captured image preview ── */
    #preview-wrap{
      position:absolute;inset:0;background:rgba(0,0,0,0.85);
      display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
      z-index:10;
    }
    #preview-wrap.show{display:flex}
    #preview-img{max-width:90%;max-height:55%;border-radius:8px;border:1px solid rgba(255,255,255,0.2)}
    .preview-btns{display:flex;gap:10px}
    .preview-btns button{
      padding:10px 20px;border-radius:30px;border:none;font:bold 13px monospace;cursor:pointer;
    }
    #btn-share{background:#7ec8e3;color:#111}
    #btn-retake{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3)}
    #btn-newscan{background:#E8604C;color:#fff;border:none}

    /* ── last-capture button (live view) ── */
    #btn-last{
      position:absolute;left:14px;
      background:rgba(0,0,0,0.72);border:1px solid rgba(255,255,255,0.3);
      color:#eee;font:bold 11px monospace;padding:9px 16px;border-radius:24px;
      display:none;cursor:pointer;letter-spacing:.04em;
    }
    #btn-last.show{display:block}
  </style>
</head>
<body>
<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="oc"></canvas>
</div>

<div id="title">PAPER DEBUG</div>

<div id="sel">
  <button id="btn-a4" class="active" onclick="setPaper('A4')">A4</button>
  <button id="btn-letter" onclick="setPaper('Letter')">Letter</button>
</div>

<!-- method indicators — positioned just above panel -->
<div id="methods" style="bottom:0">
  <div class="pill" id="pill-A">▲ Corners</div>
  <div class="pill" id="pill-B">— Lines</div>
  <div class="pill" id="pill-C">◉ Bright</div>
  <div class="pill" id="pill-D">≋ Var</div>
</div>

<div id="panel">
  <div class="cell"><div class="lbl">Status</div><div class="val" id="p-status">—</div></div>
  <div class="cell"><div class="lbl">pH (px)</div><div class="val" id="p-ph">—</div></div>
  <div class="cell"><div class="lbl">mm / px</div><div class="val" id="p-mmPx">—</div></div>
  <div class="cell"><div class="lbl">Inner bri</div><div class="val" id="p-bri">—</div></div>

  <div class="cell"><div class="lbl">det ratio</div><div class="val" id="p-ratio">—</div></div>
  <div class="cell"><div class="lbl">exp ratio</div><div class="val" id="p-exp">—</div></div>
  <div class="cell"><div class="lbl">diag ratio</div><div class="val" id="p-diag">—</div></div>
  <div class="cell"><div class="lbl">confidence</div><div class="val" id="p-conf">—</div></div>

  <div class="cell" style="grid-column:span 2">
    <div class="lbl">spanH / spanW (det canvas px)</div>
    <div class="val dim" id="p-span">—</div>
  </div>
  <div class="cell" style="grid-column:span 2">
    <div class="lbl">@ mm/px → 180 cm = ? px</div>
    <div class="val" id="p-ref">—</div>
  </div>

  <div class="cell" style="grid-column:span 2">
    <div class="lbl">Floor line (strength)</div>
    <div class="val" id="p-floor">—</div>
  </div>
  <div class="cell" style="grid-column:span 2">
    <div class="lbl">TR corner → floor</div>
    <div class="val" id="p-trheight">—</div>
  </div>

</div>

<!-- stability ring (auto-capture indicator) -->
<div id="stab-ring">
  <svg viewBox="0 0 58 58">
    <circle id="stab-track" cx="29" cy="29" r="26"/>
    <circle id="stab-fill"  cx="29" cy="29" r="26"/>
  </svg>
  <div id="stab-icon">📄</div>
</div>

<!-- last-capture button (shown during live scanning) -->
<button id="btn-last" onclick="showLast()">📷 Last</button>

<!-- captured image preview -->
<div id="preview-wrap">
  <img id="preview-img" src="" alt="capture">
  <div class="preview-btns">
    <button id="btn-share" onclick="shareCapture()">Share / Save</button>
    <button id="btn-retake" onclick="closePreview()">Close</button>
    <button id="btn-newscan" onclick="newScan()" style="display:none">New Scan</button>
  </div>
</div>

<script>
// ── PAPER SIZES ───────────────────────────────────────────────────────────────
const PAPER={A4:{w:210,h:297},Letter:{w:216,h:279}};
let selectedPaper='A4';
function setPaper(p){
  selectedPaper=p;
  document.getElementById('btn-a4').classList.toggle('active',p==='A4');
  document.getElementById('btn-letter').classList.toggle('active',p==='Letter');
}

// ── CANVAS SETUP ──────────────────────────────────────────────────────────────
const video=document.getElementById('video');
const oc=document.getElementById('oc');
const ctx=oc.getContext('2d');
const pc=document.createElement('canvas');
const pctx=pc.getContext('2d',{willReadFrequently:true});
const floorC=document.createElement('canvas'); // reused for floor detection
const floorCtx=floorC.getContext('2d',{willReadFrequently:true});
let capturedBlob=null, lastFloor=null;

function resize(){oc.width=window.innerWidth;oc.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// Position stability ring and last-capture button above panel
function positionBtn(){
  const ph=document.getElementById('panel').offsetHeight||140;
  document.getElementById('stab-ring').style.bottom=(ph+14)+'px';
  document.getElementById('methods').style.bottom=ph+'px';
  document.getElementById('btn-last').style.bottom=(ph+22)+'px';
}
window.addEventListener('resize',positionBtn);

// ── STABILITY TRACKING ────────────────────────────────────────────────────────
const STABLE_FRAMES=18, STABLE_TOL=0.04; // 18 frames within 4% → auto-capture
let pHHist=[], stableCount=0, hasCaptured=false, lastRes=null, lastCapturedBlob=null;

function trackStability(pH){
  if(pH==null){pHHist=[];stableCount=0;return 0;}
  pHHist.push(pH);if(pHHist.length>30)pHHist.shift();
  if(pHHist.length<5)return 0;
  const mean=pHHist.reduce((a,b)=>a+b,0)/pHHist.length;
  const ok=pHHist.every(v=>Math.abs(v-mean)/mean<STABLE_TOL);
  stableCount=ok?Math.min(stableCount+1,STABLE_FRAMES):Math.max(stableCount-2,0);
  return stableCount/STABLE_FRAMES;
}

function updateStabRing(ratio){
  const circ=163; // 2π×26 ≈ 163
  const fill=document.getElementById('stab-fill');
  const icon=document.getElementById('stab-icon');
  fill.style.strokeDashoffset=(circ*(1-ratio)).toFixed(1);
  fill.style.stroke=ratio>=1?'#fff':'#4CAF50';
  icon.textContent=ratio>=1?'✓':'📄';
}

// ── COORDINATES ───────────────────────────────────────────────────────────────
function getCrop(){
  const vw=video.videoWidth,vh=video.videoHeight,dw=oc.width,dh=oc.height;
  if(!vw||!vh)return null;
  if(vw/vh>dw/dh){const s=dh/vh;return{sx:(vw-dw/s)/2,sy:0,sw:dw/s,sh:vh,scale:s};}
  const s=dw/vw;return{sx:0,sy:(vh-dh/s)/2,sw:vw,sh:dh/s,scale:s};
}
function panelH(){return document.getElementById('panel').offsetHeight||140;}
function guideRect(){
  const W=oc.width,H=oc.height,top=70,avail=H-top-panelH()-24;
  const gH=avail*0.60,gW=gH*(PAPER[selectedPaper].w/PAPER[selectedPaper].h);
  return{x:W*0.05,y:top+avail*0.04,w:gW,h:gH};
}
function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}

// ── LUMA HELPERS ─────────────────────────────────────────────────────────────
function innerBri(L,pw,y0,y1,x0,x1){
  const sy=y0+Math.round((y1-y0)*0.12),ey=y1-Math.round((y1-y0)*0.12);
  const sx=x0+Math.round((x1-x0)*0.08),ex=x1-Math.round((x1-x0)*0.08);
  let s=0,n=0;
  for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++){s+=L[y*pw+x];n++;}
  return n>0?s/n:0;
}

// ── SAMPLE GUIDE RECT ────────────────────────────────────────────────────────
function sampleGuide(g){
  const cp=getCrop();
  if(!cp||!video.videoWidth)return null;
  const PH=220,scale=PH/g.h,pw=Math.round(g.w*scale);
  pc.width=pw;pc.height=PH;
  pctx.drawImage(video,
    g.x/cp.scale+cp.sx,g.y/cp.scale+cp.sy,
    g.w/cp.scale,g.h/cp.scale,
    0,0,pw,PH);
  const d=pctx.getImageData(0,0,pw,PH).data;
  const L=new Float32Array(pw*PH);
  for(let i=0;i<pw*PH;i++)L[i]=0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2];

  // 5-tap separable Gaussian blur [1,4,6,4,1]/16 → LG
  // LG is used for Sobel (better SNR for faint paper edges on white walls).
  // L (unblurred) is kept for brightness and variance methods.
  const tmp=new Float32Array(pw*PH);
  for(let y=0;y<PH;y++){
    tmp[y*pw+0]=L[y*pw+0];tmp[y*pw+1]=L[y*pw+1];
    tmp[y*pw+pw-2]=L[y*pw+pw-2];tmp[y*pw+pw-1]=L[y*pw+pw-1];
    for(let x=2;x<pw-2;x++)
      tmp[y*pw+x]=(L[y*pw+x-2]+4*L[y*pw+x-1]+6*L[y*pw+x]+4*L[y*pw+x+1]+L[y*pw+x+2])/16;
  }
  const LG=new Float32Array(pw*PH);
  for(let x=0;x<pw;x++){
    LG[0*pw+x]=tmp[0*pw+x];LG[1*pw+x]=tmp[1*pw+x];
    LG[(PH-2)*pw+x]=tmp[(PH-2)*pw+x];LG[(PH-1)*pw+x]=tmp[(PH-1)*pw+x];
    for(let y=2;y<PH-2;y++)
      LG[y*pw+x]=(tmp[(y-2)*pw+x]+4*tmp[(y-1)*pw+x]+6*tmp[y*pw+x]+4*tmp[(y+1)*pw+x]+tmp[(y+2)*pw+x])/16;
  }

  // Sobel on blurred luma (cleaner gradients for faint white-on-white edges)
  const Gx=new Float32Array(pw*PH),Gy=new Float32Array(pw*PH);
  for(let y=1;y<PH-1;y++){
    for(let x=1;x<pw-1;x++){
      const i=y*pw+x;
      Gy[i]=(LG[(y+1)*pw+x-1]+2*LG[(y+1)*pw+x]+LG[(y+1)*pw+x+1]
             -LG[(y-1)*pw+x-1]-2*LG[(y-1)*pw+x]-LG[(y-1)*pw+x+1])/4;
      Gx[i]=(LG[(y-1)*pw+x+1]+2*LG[y*pw+x+1]+LG[(y+1)*pw+x+1]
             -LG[(y-1)*pw+x-1]-2*LG[y*pw+x-1]-LG[(y+1)*pw+x-1])/4;
    }
  }
  return{L,LG,Gx,Gy,PH,pw,scale};
}

// ── METHOD A: CORNER DETECTION ────────────────────────────────────────────────
// R = |Gx|·|Gy| fires where BOTH gradients are strong simultaneously.
// A paper corner has a horizontal AND a vertical edge crossing — the wall has neither.
// Handles slightly tilted / wrinkled paper by measuring actual edge DISTANCES
// (not just vertical/horizontal projections) and cross-validating with diagonals.
function methodCorners(sam,g,expRatio){
  const{L,Gx,Gy,PH,pw,scale}=sam;
  // Corner response
  const R=new Float32Array(pw*PH);
  let maxR=0;
  for(let i=0;i<pw*PH;i++){R[i]=Math.abs(Gx[i])*Math.abs(Gy[i]);if(R[i]>maxR)maxR=R[i];}
  if(maxR<4)return null;

  // NMS 7×7
  const NR=7,minR=maxR*0.04,peaks=[];
  for(let y=NR;y<PH-NR;y++){
    for(let x=NR;x<pw-NR;x++){
      const r=R[y*pw+x];if(r<minR)continue;
      let best=true;
      outer:for(let dy=-NR;dy<=NR;dy++)for(let dx=-NR;dx<=NR;dx++){
        if(dx===0&&dy===0)continue;
        if(R[(y+dy)*pw+(x+dx)]>r){best=false;break outer;}
      }
      if(best)peaks.push({x,y,r});
    }
  }
  if(peaks.length<4)return null;
  peaks.sort((a,b)=>b.r-a.r);

  // Brightness centroid → dynamic quadrant centre (handles off-centre paper)
  let cx=0,cy=0,tb=0;
  for(let y=0;y<PH;y++)for(let x=0;x<pw;x++){const b=L[y*pw+x];cx+=x*b;cy+=y*b;tb+=b;}
  if(tb>0){cx/=tb;cy/=tb;}else{cx=pw/2;cy=PH/2;}

  // Best corner per quadrant
  const Q=[null,null,null,null];
  for(const p of peaks){
    const q=(p.y>=cy?2:0)+(p.x>=cx?1:0);
    if(!Q[q]||p.r>Q[q].r)Q[q]=p;
  }
  if(Q.some(c=>!c))return null;
  const[tl,tr,bl,br]=Q;
  if(tr.x<=tl.x||br.x<=bl.x||bl.y<=tl.y||br.y<=tr.y)return null;

  // Actual side lengths (handles rotation/tilt — not just vertical projection)
  const leftH =dist(tl,bl), rightH=dist(tr,br);
  const topW  =dist(tl,tr), botW  =dist(bl,br);
  const spanH =(leftH+rightH)/2;
  const spanW =(topW+botW)/2;

  // Diagonals — for a true rectangle diag1 ≈ diag2
  // For wrinkled/slightly bent paper this ratio degrades gracefully
  const d1=dist(tl,br), d2=dist(tr,bl);
  const diagRatio=Math.min(d1,d2)/Math.max(d1,d2); // 1.0 = perfect rectangle

  // pH from sides AND from diagonals (diagonal is robust to slight tilt)
  // For A4: diag/H = sqrt(1+(W/H)²) = sqrt(1+expRatio²)
  const expDiagFactor=Math.sqrt(1+expRatio*expRatio);
  const pH_sides=spanH/scale;
  const pH_diag =((d1+d2)/2/expDiagFactor)/scale;
  // Weight diagonal more when sides disagree or paper looks tilted
  const sideDisagree=Math.abs(leftH-rightH)/Math.max(leftH,rightH);
  const wSides=1-sideDisagree, wDiag=0.4+sideDisagree;
  const pH=(pH_sides*wSides+pH_diag*wDiag)/(wSides+wDiag);

  const x0=Math.min(tl.x,bl.x),x1=Math.max(tr.x,br.x);
  const y0=Math.min(tl.y,tr.y),y1=Math.max(bl.y,br.y);
  const inner=innerBri(L,pw,y0,y1,x0,x1);
  if(inner<85)return null;

  const detRatio=spanW/spanH;
  const ratioOk=Math.abs(detRatio-expRatio)/expRatio<0.30;
  // Correct pH using aspect ratio if sides don't agree with known shape
  const pHfinal=ratioOk ? pH : (spanW/expRatio)/scale;

  const confidence=diagRatio*(inner/255)*Math.min(1,maxR/500);
  const totalStr=Q.reduce((s,c)=>s+c.r,0);

  // Convert corners to screen pixel coords
  function toScr(p){return{x:g.x+(p.x/pw)*g.w,y:g.y+(p.y/PH)*g.h,r:p.r};}
  return{
    pH:pHfinal,spanH,spanW,inner:Math.round(inner),detRatio,
    d1,d2,diagRatio,sideDisagree,
    corners:{tl:toScr(tl),tr:toScr(tr),bl:toScr(bl),br:toScr(br)},
    confidence,totalStr,maxR,scale,PH,pw,g
  };
}

// ── METHOD B: EDGE LINES ──────────────────────────────────────────────────────
// Find the outermost strong horizontal (top/bottom) and vertical (left/right)
// edges and intersect them. Also uses aspect ratio to cross-validate.
function methodLines(sam,g,expRatio){
  const{L,Gx,Gy,PH,pw,scale}=sam;
  const mg=Math.round(PH*0.04);
  const cx0=Math.round(pw*0.08),cx1=Math.round(pw*0.92);

  // Row edge energy: MAX |Gy| across the row (3-5× more sensitive than mean
  // for faint white-on-white edges where the paper edge only spans ~3-5 px)
  const rowE=new Float32Array(PH);
  for(let y=1;y<PH-1;y++){
    let mx=0;
    for(let x=cx0;x<cx1;x++){const v=Math.abs(Gy[y*pw+x]);if(v>mx)mx=v;}
    rowE[y]=mx;
  }
  const rowEs=new Float32Array(PH);
  for(let y=1;y<PH-1;y++)rowEs[y]=(rowE[y-1]+rowE[y]+rowE[y+1])/3;

  // Col edge energy: MAX |Gx| down the column
  const colE=new Float32Array(pw);
  for(let x=1;x<pw-1;x++){
    let mx=0;
    for(let y=mg;y<PH-mg;y++){const v=Math.abs(Gx[y*pw+x]);if(v>mx)mx=v;}
    colE[x]=mx;
  }
  const colEs=new Float32Array(pw);
  for(let x=1;x<pw-1;x++)colEs[x]=(colE[x-1]+colE[x]+colE[x+1])/3;

  // Low threshold to catch faint edges (white paper on white wall)
  const ETHR=0.5;
  function rowPeaks(){
    const ps=[];
    for(let y=mg;y<PH-mg;y++){
      if(rowEs[y]>ETHR&&rowEs[y]>=rowEs[y-1]&&rowEs[y]>=rowEs[y+1])
        ps.push({y,e:rowEs[y]});
    }
    return ps.sort((a,b)=>b.e-a.e);
  }
  function colPeaks(){
    const ps=[];
    for(let x=2;x<pw-2;x++){
      if(colEs[x]>ETHR&&colEs[x]>=colEs[x-1]&&colEs[x]>=colEs[x+1])
        ps.push({x,e:colEs[x]});
    }
    return ps.sort((a,b)=>b.e-a.e);
  }
  const rp=rowPeaks(),cp2=colPeaks();
  if(rp.length<2||cp2.length<2)return null;

  // Find best (topY,botY) pair: outermost above threshold with bright interior
  let topY=-1,botY=-1,topE=0,botE=0;
  for(const p of rp){if(topY<0||p.y<topY){topY=p.y;topE=p.e;}}
  for(const p of rp){if(botY<0||p.y>botY){botY=p.y;botE=p.e;}}
  if(topY<0||botY<=topY+10)return null;

  // Find best (lftX,rgtX) pair similarly
  let lftX=-1,rgtX=-1;
  for(const p of cp2){if(lftX<0||p.x<lftX)lftX=p.x;}
  for(const p of cp2){if(rgtX<0||p.x>rgtX)rgtX=p.x;}

  const spanH=botY-topY;
  const spanW=lftX>=0&&rgtX>lftX ? rgtX-lftX : spanH*expRatio;
  const inner=innerBri(L,pw,topY,botY,cx0,cx1);
  if(inner<85)return null;

  // Aspect ratio correction
  const detRatio=spanW/spanH;
  let pH;
  if(Math.abs(detRatio-expRatio)/expRatio<0.30) pH=spanH/scale;
  else pH=(spanW/expRatio)/scale;

  const confidence=(Math.min(topE,botE)/10)*(inner/255);
  return{
    pH,spanH,spanW,inner:Math.round(inner),detRatio,
    topY,botY,lftX,rgtX,
    topE,botE,
    confidence,scale,g
  };
}

// ── METHOD C: BRIGHTNESS BLOB ─────────────────────────────────────────────────
// Paper is the brightest object in the guide rect. Find the span of near-max-
// brightness rows. Works even with very faint edges; used as a soft fallback.
function methodBrightness(sam,g){
  const{L,PH,pw,scale}=sam;
  const mg=Math.round(PH*0.04),cx0=Math.round(pw*0.10),cx1=Math.round(pw*0.90);
  const rowB=new Float32Array(PH);
  for(let y=0;y<PH;y++){let s=0;for(let x=cx0;x<cx1;x++)s+=L[y*pw+x];rowB[y]=s/(cx1-cx0);}
  const rowBs=new Float32Array(PH);
  rowBs[0]=rowB[0];rowBs[PH-1]=rowB[PH-1];
  for(let y=1;y<PH-1;y++)rowBs[y]=(rowB[y-1]+rowB[y]+rowB[y+1])/3;

  let maxB=0;
  for(let y=mg;y<PH-mg;y++)maxB=Math.max(maxB,rowBs[y]);
  if(maxB<100)return null;

  // Tight threshold: paper is only 10-15 brightness units brighter than white wall.
  // maxB-12 means only rows within 12 units of peak are counted as "paper".
  const bThr=Math.max(maxB-12,100);
  let topY=-1,botY=-1;
  for(let y=mg;y<PH-mg;y++)if(rowBs[y]>=bThr){topY=y;break;}
  for(let y=PH-mg-1;y>=mg;y--)if(rowBs[y]>=bThr){botY=y;break;}
  if(topY<0||botY<=topY+10)return null;

  const inner=innerBri(L,pw,topY,botY,cx0,cx1);
  if(inner<80)return null;

  const pH=(botY-topY)/scale;
  // Low confidence — brightness alone can't distinguish paper from bright wall
  const confidence=((inner-80)/175)*((maxB-bThr)/12)*0.5;
  return{pH,spanH:botY-topY,inner:Math.round(inner),topY,botY,maxB:Math.round(maxB),confidence,scale,g};
}

// ── METHOD D: VARIANCE / TEXTURE ─────────────────────────────────────────────
// White paper and white wall can have nearly identical brightness, but paper is
// geometrically smooth (low row variance) while painted walls have brush/roller
// texture (higher variance). Score = mean / (1 + √variance) → high for paper.
// This is the primary method for white-paper-on-white-wall scenarios.
function methodVariance(sam,g){
  const{L,PH,pw,scale}=sam;
  const mg=Math.round(PH*0.04),cx0=Math.round(pw*0.10),cx1=Math.round(pw*0.90);
  const W=cx1-cx0;

  // Per-row mean and variance of raw luma (unblurred, so texture is visible)
  const rowMean=new Float32Array(PH),rowVar=new Float32Array(PH);
  for(let y=0;y<PH;y++){
    let s=0;for(let x=cx0;x<cx1;x++)s+=L[y*pw+x];
    const m=s/W;rowMean[y]=m;
    let v=0;for(let x=cx0;x<cx1;x++){const dv=L[y*pw+x]-m;v+=dv*dv;}
    rowVar[y]=v/W;
  }

  // Score: bright + smooth → paper
  const rowScore=new Float32Array(PH);
  for(let y=0;y<PH;y++)rowScore[y]=rowMean[y]/(1+Math.sqrt(rowVar[y]));

  // Smooth scores with 5-tap Gaussian
  const rowScoreS=new Float32Array(PH);
  rowScoreS[0]=rowScore[0];rowScoreS[1]=rowScore[1];
  rowScoreS[PH-2]=rowScore[PH-2];rowScoreS[PH-1]=rowScore[PH-1];
  for(let y=2;y<PH-2;y++)
    rowScoreS[y]=(rowScore[y-2]+4*rowScore[y-1]+6*rowScore[y]+4*rowScore[y+1]+rowScore[y+2])/16;

  // Find peak score
  let maxS=0;
  for(let y=mg;y<PH-mg;y++)maxS=Math.max(maxS,rowScoreS[y]);
  if(maxS<55)return null;

  // Span of rows with score ≥ 80% of peak (the paper region)
  const sThr=maxS*0.80;
  let topY=-1,botY=-1;
  for(let y=mg;y<PH-mg;y++)if(rowScoreS[y]>=sThr){topY=y;break;}
  for(let y=PH-mg-1;y>=mg;y--)if(rowScoreS[y]>=sThr){botY=y;break;}
  if(topY<0||botY<0||botY<=topY+10)return null;

  const inner=innerBri(L,pw,topY,botY,cx0,cx1);
  if(inner<75)return null;

  const pH=(botY-topY)/scale;
  // Confidence: how much higher is the paper score vs surrounding wall scores
  const outerScore=(rowScoreS[mg]+rowScoreS[PH-mg-1])/2;
  const contrast=(maxS-outerScore)/Math.max(maxS,1);
  const confidence=contrast*(inner/255)*0.55;
  return{pH,spanH:botY-topY,inner:Math.round(inner),topY,botY,
         maxScore:Math.round(maxS),contrast:+contrast.toFixed(2),confidence,scale,g};
}

// ── COMBINE METHODS ───────────────────────────────────────────────────────────
function detectPaper(g){
  const expRatio=PAPER[selectedPaper].w/PAPER[selectedPaper].h;
  const sam=sampleGuide(g);
  if(!sam)return null;

  const A=methodCorners(sam,g,expRatio);
  const B=methodLines(sam,g,expRatio);
  const C=methodBrightness(sam,g);
  const D=methodVariance(sam,g);

  // Collect candidates with their pH and confidence
  const cands=[];
  if(A)cands.push({src:'A',pH:A.pH,conf:A.confidence});
  if(B)cands.push({src:'B',pH:B.pH,conf:B.confidence});
  if(C)cands.push({src:'C',pH:C.pH,conf:C.confidence});
  if(D)cands.push({src:'D',pH:D.pH,conf:D.confidence});
  if(!cands.length)return null;

  // Weighted average of estimates that agree within 30% of the median
  const sorted=[...cands].sort((a,b)=>a.pH-b.pH);
  const median=sorted[Math.floor(sorted.length/2)].pH;
  const agreed=cands.filter(c=>Math.abs(c.pH-median)/median<0.30);

  let wSum=0,phSum=0;
  for(const c of agreed){phSum+=c.pH*c.conf;wSum+=c.conf;}
  const finalPH=wSum>0?phSum/wSum:cands.sort((a,b)=>b.conf-a.conf)[0].pH;
  const finalConf=wSum>0?wSum/agreed.length:0;
  const mmPx=PAPER[selectedPaper].h/finalPH;
  const inner=A?.inner??B?.inner??C?.inner??D?.inner??0;
  const detRatio=A?.detRatio??B?.detRatio??expRatio;

  // ── SANITY GUARD ──────────────────────────────────────────────────────────
  // If no corners detected AND blended pH is ≥ 82% of the guide rect height,
  // the brightness/variance/lines methods are measuring the guide region itself
  // rather than the actual (smaller, more distant) paper.
  // In this case scale is unreliable — flag it and let the UI warn the user.
  const phFrac=finalPH/g.h;
  const phSuspect=!A&&phFrac>0.82;

  return{
    pH:finalPH, mmPx, inner, detRatio, expRatio, confidence:finalConf,
    methods:{A:!!A,B:!!B,C:!!C,D:!!D},
    cornerResult:A, lineResult:B, briResult:C, varResult:D,
    diagRatio:A?.diagRatio??null,
    agreed:agreed.map(c=>c.src).join('+'),
    phFrac:+phFrac.toFixed(2), phSuspect,
  };
}

// ── FLOOR DETECTION ──────────────────────────────────────────────────────────
// Samples the strip below the guide rect in N vertical slices, finds the
// strongest horizontal edge (Gy) per slice, then fits a line through those
// (x, y) sample points via linear regression.
// This handles angled views where the floor/wall junction is a diagonal line.
// Returns { floorAt(x), points, slope, edgeStr } or null.
function detectFloor(g){
  const cp=getCrop();
  if(!cp||!video.videoWidth)return null;

  const W=oc.width,H=oc.height;
  const stripTop=Math.round(g.y+g.h)+8;
  const stripBot=H-panelH()-8;
  const stripH=stripBot-stripTop;
  if(stripH<30)return null;

  // One sample for the full strip (single getImageData call)
  const PW=240,PH=Math.min(stripH,90);
  floorC.width=PW;floorC.height=PH;
  floorCtx.drawImage(video,
    cp.sx, stripTop/cp.scale+cp.sy,
    cp.sw, stripH/cp.scale,
    0,0,PW,PH);

  const d=floorCtx.getImageData(0,0,PW,PH).data;
  const L=new Float32Array(PW*PH);
  for(let i=0;i<PW*PH;i++)L[i]=0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2];

  // Divide into N vertical slices, find floor y per slice
  const N=8;
  const sw=Math.floor(PW/N); // slice width in detection pixels
  const points=[];           // {x, y} in screen coords

  for(let si=0;si<N;si++){
    const x0=si*sw, x1=Math.min(x0+sw,PW-1);

    // Row-max |Gy| within this slice only
    const rowE=new Float32Array(PH);
    for(let y=1;y<PH-1;y++){
      let mx=0;
      for(let x=x0+1;x<x1-1;x++){
        const gy=Math.abs((L[(y+1)*PW+x-1]+2*L[(y+1)*PW+x]+L[(y+1)*PW+x+1]
                          -L[(y-1)*PW+x-1]-2*L[(y-1)*PW+x]-L[(y-1)*PW+x+1])/4);
        if(gy>mx)mx=gy;
      }
      rowE[y]=mx;
    }
    // 3-tap smooth
    const rowEs=new Float32Array(PH);
    for(let y=1;y<PH-2;y++)rowEs[y]=(rowE[y-1]+rowE[y]+rowE[y+1])/3;

    // Find the LOWEST strong edge in this slice (not the strongest).
    // Scanning bottom→top means we find the actual floor before the baseboard top,
    // since the floor is always below the baseboard. The threshold is 30% of the
    // slice's peak so both edges qualify, but we stop at the first one from below.
    let maxE=0;
    for(let y=2;y<PH-2;y++) if(rowEs[y]>maxE) maxE=rowEs[y];
    const sliceThr=Math.max(maxE*0.30, 1.5);
    let bestY=-1,bestE=0;
    for(let y=PH-3;y>=2;y--){if(rowEs[y]>=sliceThr){bestY=y;bestE=rowEs[y];break;}}
    if(bestY>=0&&bestE>1.5){
      // Map back to screen coordinates
      const xScr=((x0+x1)/2/PW)*W;
      const yScr=stripTop+(bestY/PH)*stripH;
      points.push({x:xScr,y:yScr,e:maxE});
    }
  }

  if(points.length<2)return null;

  // Linear regression: y = m*x + b (floor line across screen)
  const n=points.length;
  let sx=0,sy=0,sxy=0,sx2=0;
  for(const p of points){sx+=p.x;sy+=p.y;sxy+=p.x*p.y;sx2+=p.x*p.x;}
  const denom=n*sx2-sx*sx;
  let m=0,b=sy/n;
  if(Math.abs(denom)>0.001){m=(n*sxy-sx*sy)/denom;b=(sy-m*sx)/n;}

  const floorAt=x=>m*x+b;
  const avgE=points.reduce((s,p)=>s+p.e,0)/points.length;
  const slopeDeg=(Math.atan(m)*180/Math.PI).toFixed(1);

  return{floorAt,m,b,points,edgeStr:+avgE.toFixed(1),slopeDeg,stripTop,stripBot};
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw(res){
  const g=guideRect();
  ctx.clearRect(0,0,oc.width,oc.height);
  const ok=!!res;

  // Guide rect background
  ctx.save();
  if(!ok)ctx.setLineDash([6,5]);
  ctx.strokeStyle=ok?'#4CAF50':'rgba(255,255,255,0.35)';
  ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(g.x,g.y,g.w,g.h,8);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=ok?'rgba(76,175,80,0.06)':'rgba(255,255,255,0.03)';
  ctx.beginPath();ctx.roundRect(g.x,g.y,g.w,g.h,8);ctx.fill();
  ctx.restore();

  ctx.fillStyle=ok?'#4CAF50':'rgba(255,255,255,0.4)';
  ctx.font='bold 12px monospace';ctx.textAlign='center';
  ctx.fillText(selectedPaper+(ok?' ✓':''),g.x+g.w/2,g.y+18);

  if(!ok){
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='11px monospace';ctx.textAlign='center';
    ctx.fillText('Place paper inside this box',g.x+g.w/2,g.y+g.h/2);
  }
  // "Move closer" warning when blended pH fills guide box (no corners, paper too far)
  if(res&&res.phSuspect){
    ctx.save();
    ctx.fillStyle='rgba(237,100,50,0.92)';
    ctx.font='bold 13px monospace';ctx.textAlign='center';
    ctx.fillText('⚠ MOVE CLOSER — corners needed',g.x+g.w/2,g.y+g.h/2-8);
    ctx.font='11px monospace';ctx.fillStyle='rgba(255,180,150,0.85)';
    ctx.fillText('blended pH ≈ guide box ('+Math.round(res.phFrac*100)+'%)',g.x+g.w/2,g.y+g.h/2+12);
    ctx.restore();
  }

  if(res){
    const A=res.cornerResult, B=res.lineResult;

    // ── Method B: draw edge lines (yellow dashed) ──────────────────────────
    if(B){
      ctx.save();
      ctx.strokeStyle='rgba(237,217,78,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
      const toScrY=y=>g.y+(y/B.spanH+0)*g.h; // approx, just for vis
      const tY=g.y+(B.topY/220)*g.h, bY=g.y+(B.botY/220)*g.h;
      ctx.beginPath();ctx.moveTo(g.x-6,tY);ctx.lineTo(g.x+g.w+6,tY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(g.x-6,bY);ctx.lineTo(g.x+g.w+6,bY);ctx.stroke();
      if(B.lftX>=0&&B.rgtX>B.lftX){
        const lX=g.x+(B.lftX/B.spanH)*g.h*(PAPER[selectedPaper].w/PAPER[selectedPaper].h);
        // simpler: use proportional mapping
        const scale_=g.w/Math.round(g.w*(220/g.h)); // pw→screenW
        const lSx=g.x+B.lftX*scale_, rSx=g.x+B.rgtX*scale_;
        ctx.beginPath();ctx.moveTo(lSx,g.y-4);ctx.lineTo(lSx,g.y+g.h+4);ctx.stroke();
        ctx.beginPath();ctx.moveTo(rSx,g.y-4);ctx.lineTo(rSx,g.y+g.h+4);ctx.stroke();
      }
      ctx.setLineDash([]);ctx.restore();
    }

    // ── Method A: draw corners + outline + diagonals ───────────────────────
    if(A){
      const C=A.corners;
      // Paper outline
      ctx.save();
      ctx.strokeStyle='rgba(126,200,227,0.9)';ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(C.tl.x,C.tl.y);ctx.lineTo(C.tr.x,C.tr.y);
      ctx.lineTo(C.br.x,C.br.y);ctx.lineTo(C.bl.x,C.bl.y);
      ctx.closePath();ctx.stroke();

      // Diagonals (shows rectangle validity + allows diagonal height calc)
      const diagColor=A.diagRatio>0.88?'rgba(126,200,227,0.35)':'rgba(255,100,100,0.4)';
      ctx.strokeStyle=diagColor;ctx.lineWidth=1;ctx.setLineDash([3,5]);
      ctx.beginPath();ctx.moveTo(C.tl.x,C.tl.y);ctx.lineTo(C.br.x,C.br.y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(C.tr.x,C.tr.y);ctx.lineTo(C.bl.x,C.bl.y);ctx.stroke();
      ctx.setLineDash([]);

      // Corner dots
      [['TL',C.tl],['TR',C.tr],['BL',C.bl],['BR',C.br]].forEach(([lbl,c])=>{
        ctx.beginPath();ctx.arc(c.x,c.y,6,0,Math.PI*2);
        ctx.fillStyle='#7ec8e3';ctx.fill();
        ctx.strokeStyle='#fff';ctx.lineWidth=1.2;ctx.stroke();
        ctx.fillStyle='#fff';ctx.font='bold 10px monospace';
        ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.fillText(lbl,c.x,c.y-8);
      });
      ctx.restore();

      // pH bracket
      const leftTop=C.tl,leftBot=C.bl;
      ctx.save();
      ctx.strokeStyle='rgba(126,200,227,0.5)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(g.x-16,leftTop.y);ctx.lineTo(g.x-16,leftBot.y);ctx.stroke();
      ctx.fillStyle='rgba(126,200,227,0.9)';ctx.font='10px monospace';ctx.textAlign='right';
      ctx.fillText(res.pH.toFixed(0)+'px',g.x-19,(leftTop.y+leftBot.y)/2+4);
      ctx.restore();
    }
  }

  // ── Floor detection + TR height measurement ───────────────────────────────
  const floor=detectFloor(g);
  lastFloor=floor;

  if(floor){
    const W=oc.width;
    ctx.save();

    // Fitted floor line (diagonal — handles angled camera view)
    ctx.strokeStyle='rgba(255,140,0,0.85)';ctx.lineWidth=2;ctx.setLineDash([10,7]);
    ctx.beginPath();
    ctx.moveTo(0,floor.floorAt(0));
    ctx.lineTo(W,floor.floorAt(W));
    ctx.stroke();
    ctx.setLineDash([]);

    // Sample dots — show exactly where each slice detected the edge
    floor.points.forEach(p=>{
      ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);
      ctx.fillStyle='rgba(255,140,0,0.9)';ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
    });

    // Label with slope so user can see the angle correction
    const labelY=floor.floorAt(10)-8;
    ctx.fillStyle='rgba(255,140,0,0.9)';ctx.font='bold 10px monospace';
    ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillText('FLOOR  '+floor.slopeDeg+'°  str:'+floor.edgeStr,10,labelY);
    ctx.restore();

    // TR corner height — direct method:
    //   dist(TR,BR) in screen px IS 297 mm  → derive mm/px right here
    //   then (floorY - TR.y) × that mm/px = actual height
    //   No blending, no detection-canvas scale, no intermediate pH.
    if(res&&res.cornerResult){
      const C=res.cornerResult.corners;

      // Paper height in screen px from each side (already in screen coords via toScr)
      const rightPx=dist(C.tr,C.br);
      const leftPx =dist(C.tl,C.bl);
      const paperPxH=(rightPx+leftPx)/2;  // avg both sides = paper.h mm reference

      // ── THREE INDEPENDENT mm/px ESTIMATES ────────────────────────────────
      // 1) Right vertical side: dist(TR,BR) = paper.h mm
      // 2) Left vertical side:  dist(TL,BL) = paper.h mm
      // 3) Diagonal:            dist(TL,BR) or dist(TR,BL) = sqrt(w²+h²) mm
      //    For A4: sqrt(210²+297²) = 363.08 mm
      //    Rearranged: 297mm equiv from diagonal = diagAvgPx / (diagMm/paper.h)
      const paper=PAPER[selectedPaper];
      const d1_scr=dist(C.tl,C.br), d2_scr=dist(C.tr,C.bl);
      const diagAvgPx=(d1_scr+d2_scr)/2;
      const diagMm=Math.sqrt(paper.w**2+paper.h**2); // 363.08mm for A4
      const diagPxEquiv=diagAvgPx/(diagMm/paper.h);  // diagonal-derived paper.h in screen px

      const mmPx_right=paper.h/rightPx;
      const mmPx_left =paper.h/leftPx;
      const mmPx_diag =diagMm/diagAvgPx;

      // ── TRIANGULATE ───────────────────────────────────────────────────────
      // Median-anchored weighted average — reject estimates > 10% from median.
      // Diagonal gets slightly lower weight (more sensitive to quadrilateral skew).
      const triEst=[{v:mmPx_right,w:1.0},{v:mmPx_left,w:1.0},{v:mmPx_diag,w:0.8}];
      const medVal=[mmPx_right,mmPx_left,mmPx_diag].slice().sort((a,b)=>a-b)[1];
      const triAgreed=triEst.filter(e=>Math.abs(e.v-medVal)/medVal<0.10);
      let _wS=0,_vS=0;
      for(const e of triAgreed){_vS+=e.v*e.w;_wS+=e.w;}
      const mmPxTriang=_wS>0?_vS/_wS:medVal;

      // Diagonal agreement vs side average — high % = corners are reliable
      const sideMmPx=(mmPx_right+mmPx_left)/2;
      const diagAgreePct=Math.round(Math.max(0,100-Math.abs(mmPx_diag-sideMmPx)/sideMmPx*100));

      // Store on res so panel + overlay can read it
      res._paperPxH   =+paperPxH.toFixed(1);
      res._diagPxEquiv=+diagPxEquiv.toFixed(1);
      res._mmPx_right =+mmPx_right.toFixed(4);
      res._mmPx_left  =+mmPx_left.toFixed(4);
      res._mmPx_diag  =+mmPx_diag.toFixed(4);
      res._mmPxTriang =+mmPxTriang.toFixed(4);
      res._mmPxDirect =+mmPxTriang.toFixed(4); // alias for overlay compat
      res._diagAgreePct=diagAgreePct;
      res._agreeCount =triAgreed.length;

      const distPx=floor.floorAt(C.tr.x)-C.tr.y;
      if(distPx>10){
        const heightCm=(distPx*mmPxTriang/10).toFixed(1);
        res._trHeightCm=heightCm;
        res._trDistPx=Math.round(distPx);

        const mx=C.tr.x+28;
        ctx.save();
        // Vertical bracket
        ctx.strokeStyle='rgba(255,210,50,0.9)';ctx.lineWidth=1.5;
        const floorAtTR=floor.floorAt(C.tr.x);
        ctx.beginPath();ctx.moveTo(mx,C.tr.y);ctx.lineTo(mx,floorAtTR);ctx.stroke();
        [C.tr.y,floorAtTR].forEach(ty=>{
          ctx.beginPath();ctx.moveTo(mx-6,ty);ctx.lineTo(mx+6,ty);ctx.stroke();
        });
        // Height label
        const midY=(C.tr.y+floorAtTR)/2;
        ctx.fillStyle='rgba(0,0,0,0.65)';
        ctx.fillRect(mx+8,midY-11,78,22);
        ctx.fillStyle='#FFD700';ctx.font='bold 13px monospace';
        ctx.textAlign='left';ctx.textBaseline='middle';
        ctx.fillText(heightCm+' cm',mx+12,midY);
        ctx.restore();
      }
    }
  }

  // ── Method pills ──────────────────────────────────────────────────────────
  document.getElementById('pill-A').className='pill'+(res?.methods?.A?' active-A':'');
  document.getElementById('pill-B').className='pill'+(res?.methods?.B?' active-B':'');
  document.getElementById('pill-C').className='pill'+(res?.methods?.C?' active-C':'');
  document.getElementById('pill-D').className='pill'+(res?.methods?.D?' active-D':'');

  // ── Data panel ────────────────────────────────────────────────────────────
  const set=(id,v,cls)=>{const e=document.getElementById(id);e.textContent=v;e.className='val '+(cls||'dim');};
  if(res){
    const rOk=Math.abs(res.detRatio-res.expRatio)/res.expRatio<0.25;
    const dOk=res.diagRatio==null||res.diagRatio>0.85;
    set('p-status', res.phSuspect ? '⚠ MOVE CLOSER' : 'OK ('+res.agreed+')',
        res.phSuspect ? 'warn' : 'ok');
    set('p-ph',res.pH.toFixed(1)+' px'+(res.phSuspect?' ('+Math.round(res.phFrac*100)+'% guide)':''),'ok');
    set('p-mmPx', res.phSuspect ? '— (blended unreliable)' : res.mmPx.toFixed(2)+' mm/px',
        res.phSuspect ? 'bad' : 'ok');
    set('p-bri',res.inner+'/255',res.inner>=130?'ok':res.inner>=90?'dim':'bad');
    set('p-ratio',res.detRatio.toFixed(3),rOk?'ok':'warn');
    set('p-exp',res.expRatio.toFixed(3),'dim');
    set('p-diag',res.diagRatio!=null?res.diagRatio.toFixed(3):'n/a',dOk?'ok':'warn');
    set('p-conf',(res.confidence*100).toFixed(0)+'%',res.confidence>0.3?'ok':res.confidence>0.1?'dim':'bad');
    const A=res.cornerResult,B=res.lineResult;
    const spanH=A?.spanH??B?.spanH??0,spanW=A?.spanW??B?.spanW??0;
    // p-ref: only show when scale is trustworthy
    const mmPxForRef=res._mmPxTriang||res._mmPxDirect||(!res.phSuspect&&res.mmPx)||0;
    const ref=mmPxForRef>0?Math.round(1800/mmPxForRef):0;
    set('p-ref', res.phSuspect?'— move closer':ref+' px', (!res.phSuspect&&ref>200&&ref<2000)?'ok':'bad');
    set('p-span',spanH.toFixed(0)+' × '+spanW.toFixed(0)+'  [blended pH='+res.pH.toFixed(0)+']','dim');
  } else {
    ['p-ph','p-mmPx','p-bri','p-ratio','p-diag','p-conf','p-span','p-ref']
      .forEach(id=>set(id,'—','bad'));
    set('p-status','NO PAPER','bad');
    set('p-exp',PAPER[selectedPaper].w/PAPER[selectedPaper].h>0
        ?(PAPER[selectedPaper].w/PAPER[selectedPaper].h).toFixed(3):'—','dim');
  }

  // ── Floor + TR height panel update ────────────────────────────────────────
  const fl=lastFloor;
  if(fl){
    const midY=Math.round(fl.floorAt(oc.width/2));
    set('p-floor',midY+'px  '+fl.slopeDeg+'°  str:'+fl.edgeStr,'ok');
  } else {
    set('p-floor','not detected','bad');
  }
  // Triangulated mm/px: sides + diagonal → single trusted value
  if(res&&res._mmPxTriang){
    const agreeColor=res._diagAgreePct>=95?'ok':res._diagAgreePct>=80?'dim':'warn';
    set('p-ph','sides:'+res._paperPxH+'px  diag:'+res._diagPxEquiv+'px','ok');
    set('p-mmPx',res._mmPxTriang+' mm/px  ⊿'+res._diagAgreePct+'%',agreeColor);
  }
  if(fl&&res&&res._trHeightCm){
    set('p-trheight',res._trHeightCm+' cm  ('+res._trDistPx+' px)','ok');
  } else {
    set('p-trheight','—','dim');
  }

}

// ── CAPTURE OVERLAY ───────────────────────────────────────────────────────────
// Draws a data panel onto the captured canvas so the shared image is self-contained.
function drawCaptureOverlay(c,W,H,res){
  const PAD=14,LH=22,FONT='bold 13px monospace',SMALL='11px monospace';
  const paper=PAPER[selectedPaper];

  // ── Build text rows ────────────────────────────────────────────────────────
  const rows=[];
  if(res){
    // Pick ONE mm/px: prefer triangulated corner measurement, fall back to blended
    const hasCorners=!!res._mmPxTriang;
    const mmPx=hasCorners?res._mmPxTriang:res.mmPx;
    const mmPxSrc=hasCorners?`triag(${res._agreeCount}/3)`:'blended ⚠';
    const methods=Object.entries(res.methods).filter(([,v])=>v).map(([k])=>k).join('+');

    rows.push({text:`${selectedPaper}  ·  Methods: ${methods||'—'}  ·  Conf: ${(res.confidence*100).toFixed(0)}%`,
               color:'#4CAF50',bold:true});
    // Scale line — single source of truth (triangulated)
    rows.push({text:`Scale: ${hasCorners?res._paperPxH+'px (sides)':'pH='+res.pH.toFixed(0)+'px'} = ${PAPER[selectedPaper].h}mm  →  1px = ${(+mmPx).toFixed(3)}mm  (${mmPxSrc})`,
               color:hasCorners?'#eee':'#EDD94E'});
    // Triangulation breakdown: R side / L side / diagonal → single value
    if(hasCorners){
      const dColor=res._diagAgreePct>=90?'#7ec8e3':res._diagAgreePct>=75?'#EDD94E':'#ff6b6b';
      rows.push({text:`R:${res._mmPx_right.toFixed(3)}  L:${res._mmPx_left.toFixed(3)}  Diag:${res._mmPx_diag.toFixed(3)}  → ${res._mmPxTriang.toFixed(3)}  ⊿${res._diagAgreePct}%`,
                 color:dColor,small:true});
    }
    rows.push({text:`Ratio: ${res.detRatio.toFixed(3)} (exp ${res.expRatio.toFixed(3)})  Rect: ${res.diagRatio!=null?res.diagRatio.toFixed(3):'n/a'}  Bri: ${res.inner}/255`,
               color:'#aaa',small:true});
    // Debug: show blended pH if it differs significantly from triangulated
    if(hasCorners){
      const pct=Math.round(Math.abs(res._mmPxTriang-res.mmPx)/res._mmPxTriang*100);
      if(pct>15)rows.push({text:`⚠ blended mm/px=${res.mmPx.toFixed(3)} differs ${pct}% — blended pH unreliable`,
                           color:'#ff6b6b',small:true});
    }

    // Separator
    rows.push({sep:true});

    // Scale table — only when scale is trustworthy
    if(res.phSuspect){
      rows.push({text:`⚠ MOVE CLOSER — blended pH=${res.pH.toFixed(0)}px is ${Math.round(res.phFrac*100)}% of guide box`,
                 color:'#ff6b6b',bold:true});
      rows.push({text:`Scale unreliable without corner detection`,
                 color:'#ff6b6b',small:true});
    } else {
      const px160=Math.round(1600/mmPx);
      const px170=Math.round(1700/mmPx);
      const px180=Math.round(1800/mmPx);
      const px190=Math.round(1900/mmPx);
      rows.push({text:`160 cm → ${px160}px   170 cm → ${px170}px`,color:'#7ec8e3'});
      rows.push({text:`180 cm → ${px180}px   190 cm → ${px190}px`,color:'#7ec8e3',bold:true});
    }

    // Floor + TR height
    rows.push({sep:true});
    const fl=lastFloor;
    if(fl&&res._trHeightCm){
      rows.push({text:`Floor slope: ${fl.slopeDeg}°  str: ${fl.edgeStr}  pts: ${fl.points.length}/8`,
                 color:'rgba(255,140,0,0.9)',small:true});
      rows.push({text:`TR corner → floor:  ${res._trHeightCm} cm  (${res._trDistPx} px)`,
                 color:'#FFD700',bold:true});
      // Calibration row (if user entered actual measurement)
    } else {
      rows.push({text:`Floor: ${fl?'detected':'not detected'}   Corners: ${res.cornerResult?'ok':'missing'}`,
                 color:'#888',small:true});
    }
  } else {
    rows.push({text:'NO PAPER DETECTED',color:'#ff6b6b',bold:true});
    rows.push({text:`Paper type: ${selectedPaper}  (${paper.w} × ${paper.h} mm)`,color:'#aaa'});
  }

  // ── Measure panel height ───────────────────────────────────────────────────
  let panelH=PAD*2;
  for(const r of rows)panelH+=r.sep?10:LH;

  const y0=H-panelH;

  // ── Background ────────────────────────────────────────────────────────────
  c.fillStyle='rgba(0,0,0,0.88)';
  c.fillRect(0,y0,W,panelH);
  // Accent bar top
  c.fillStyle=res?'#4CAF50':'#ff6b6b';
  c.fillRect(0,y0,W,3);

  // ── Render rows ────────────────────────────────────────────────────────────
  let ty=y0+PAD;
  for(const r of rows){
    if(r.sep){
      c.strokeStyle='rgba(255,255,255,0.15)';c.lineWidth=1;
      c.beginPath();c.moveTo(PAD,ty+4);c.lineTo(W-PAD,ty+4);c.stroke();
      ty+=10;continue;
    }
    c.font=r.bold?(r.small?'bold 11px monospace':FONT):(r.small?SMALL:FONT.replace('bold ',''));
    c.fillStyle=r.color||'#eee';
    c.textAlign='left';c.textBaseline='top';
    c.fillText(r.text,PAD,ty);
    ty+=LH;
  }

  // ── Watermark ─────────────────────────────────────────────────────────────
  c.font='10px monospace';c.fillStyle='rgba(255,255,255,0.25)';
  c.textAlign='right';
  c.fillText('height-scan · paper-debug',W-PAD,y0+panelH-12);
}

// ── CAPTURE ───────────────────────────────────────────────────────────────────
function captureDebug(){
  if('vibrate'in navigator)navigator.vibrate([40,20,80]);
  const cap=document.createElement('canvas');
  cap.width=oc.width;cap.height=oc.height;
  const c=cap.getContext('2d');
  const cp=getCrop();
  if(cp)c.drawImage(video,cp.sx,cp.sy,cp.sw,cp.sh,0,0,cap.width,cap.height);
  c.drawImage(oc,0,0);
  drawCaptureOverlay(c,cap.width,cap.height,lastRes);
  // Redraw floor detection ON TOP of the text overlay so it's visible in the saved image.
  // In the live view the canvas and HTML panel are separate layers; in the capture they
  // flatten, so the opaque text panel buries the floor line unless we paint it again here.
  if(lastFloor){
    const fl=lastFloor;
    c.save();
    c.strokeStyle='rgba(255,140,0,0.9)';c.lineWidth=2;c.setLineDash([10,7]);
    c.beginPath();c.moveTo(0,fl.floorAt(0));c.lineTo(cap.width,fl.floorAt(cap.width));c.stroke();
    c.setLineDash([]);
    fl.points.forEach(p=>{
      c.beginPath();c.arc(p.x,p.y,5,0,Math.PI*2);
      c.fillStyle='rgba(255,140,0,0.9)';c.fill();
      c.strokeStyle='#fff';c.lineWidth=1.2;c.stroke();
    });
    const lblY=fl.floorAt(10);
    c.fillStyle='rgba(0,0,0,0.6)';c.fillRect(6,lblY-18,240,18);
    c.fillStyle='rgba(255,140,0,1)';c.font='bold 10px monospace';
    c.textAlign='left';c.textBaseline='bottom';
    c.fillText('FLOOR  '+fl.slopeDeg+'°  str:'+fl.edgeStr+'  pts:'+fl.points.length+'/8',10,lblY-2);
    c.restore();
  }
  if(lastFloor&&lastRes&&lastRes._trHeightCm&&lastRes.cornerResult){
    const C=lastRes.cornerResult.corners,fl=lastFloor;
    const mx=C.tr.x+28,flY=fl.floorAt(C.tr.x);
    c.save();
    c.strokeStyle='rgba(255,210,50,0.9)';c.lineWidth=1.5;
    c.beginPath();c.moveTo(mx,C.tr.y);c.lineTo(mx,flY);c.stroke();
    [C.tr.y,flY].forEach(ty=>{c.beginPath();c.moveTo(mx-6,ty);c.lineTo(mx+6,ty);c.stroke();});
    const midY=(C.tr.y+flY)/2;
    c.fillStyle='rgba(0,0,0,0.7)';c.fillRect(mx+8,midY-11,82,22);
    c.fillStyle='#FFD700';c.font='bold 13px monospace';
    c.textAlign='left';c.textBaseline='middle';
    c.fillText(lastRes._trHeightCm+' cm',mx+12,midY);
    c.restore();
  }

  cap.toBlob(blob=>{
    capturedBlob=blob;
    lastCapturedBlob=blob; // persist across retakes for "Last" button
    const url=URL.createObjectURL(blob);
    document.getElementById('preview-img').src=url;
    showPreview(false); // false = just-captured mode (shows New Scan)
  },'image/jpeg',0.90);
}

function shareCapture(){
  if(!capturedBlob)return;
  const file=new File([capturedBlob],'paper-debug.jpg',{type:'image/jpeg'});
  if(navigator.canShare?.({files:[file]})){
    navigator.share({files:[file],title:'Paper Debug'}).catch(()=>downloadCapture());
  } else {
    downloadCapture();
  }
}
function downloadCapture(){
  if(!capturedBlob)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(capturedBlob);a.download='paper-debug.jpg';a.click();
}
// Show the preview overlay.
// reviewOnly=true  → user tapped "Last"; scan is still running, don't show New Scan
// reviewOnly=false → just auto-captured; show New Scan button too
function showPreview(reviewOnly){
  document.getElementById('preview-wrap').classList.add('show');
  document.getElementById('btn-newscan').style.display=reviewOnly?'none':'';
  document.getElementById('btn-last').classList.remove('show'); // hide while preview open
}

// "Close" — dismiss preview, allow next auto-capture (keeps ring progress)
function closePreview(){
  document.getElementById('preview-wrap').classList.remove('show');
  hasCaptured=false; // must reset so the ring can trigger another auto-capture
  updateLastBtn();
}

// "New Scan" — dismiss preview AND reset scan so the ring starts fresh
function newScan(){
  document.getElementById('preview-wrap').classList.remove('show');
  capturedBlob=null;
  hasCaptured=false;
  pHHist=[];stableCount=0;
  updateStabRing(0);
  updateLastBtn();
}

// "Last" button — re-open the last saved capture without touching scan state
function showLast(){
  if(!lastCapturedBlob)return;
  capturedBlob=lastCapturedBlob;
  document.getElementById('preview-img').src=URL.createObjectURL(lastCapturedBlob);
  showPreview(true); // review-only: no New Scan button
}

// Show/hide the "Last" floating button
function updateLastBtn(){
  const visible=!!lastCapturedBlob&&!document.getElementById('preview-wrap').classList.contains('show');
  document.getElementById('btn-last').classList.toggle('show',visible);
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
async function start(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}},audio:false});
    video.srcObject=stream;await video.play();
  }catch(e){alert('Camera: '+e.message);return;}

  positionBtn();
  function loop(){
    if(video.videoWidth>0 && !document.getElementById('preview-wrap').classList.contains('show')){
      const res=detectPaper(guideRect());
      lastRes=res;
      const stab=trackStability(res?res.pH:null);
      updateStabRing(stab);
      draw(res);
      if(!hasCaptured && stab>=1.0){
        hasCaptured=true;
        captureDebug();
      }
      updateLastBtn();
    }
    requestAnimationFrame(loop);
  }
  loop();
}
start();
</script>
